<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المستخدمين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI'; background: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 800px; margin: auto; border-top: 6px solid #34495e; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #34495e; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; grid-column: span 2; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-users-cog"></i> إدارة حسابات النظام</h2>
        <div class="form-grid">
            <input type="number" id="uNo" placeholder="رقم الموظف (U_no)">
            <input type="text" id="uName" placeholder="اسم الموظف">
            <input type="text" id="uUser" placeholder="اسم الدخول">
            <input type="password" id="uPass" placeholder="كلمة المرور">
            <select id="uLevel" style="grid-column: span 2;">
                <option value="1">مدير نظام</option>
                <option value="2">موظف استقبال</option>
                <option value="3">طبيب</option>
            </select>
            <button class="btn-save" onclick="saveUser()">إنشاء حساب جديد</button>
        </div>
    </div>
    <script>
        function saveUser() {
            alert("تم إنشاء حساب المستخدم بنجاح وحفظه في ذاكرة المتصفح!");
            location.reload();
        }
    </script>
</body>
</html>
