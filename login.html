<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | مستشفى كسلا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma;
            /* إضافة خلفية طبية هادئة */
            background: linear-gradient(rgba(26, 42, 108, 0.7), rgba(26, 42, 108, 0.7)), 
                        url("5.jpg");
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 380px;
            text-align: center;
            backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي */
        }

        .login-card i.main-icon {
            font-size: 4rem;
            color: #1a2a6c;
            margin-bottom: 15px;
        }

        h2 { color: #1a2a6c; margin-bottom: 25px; }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 15px;
            color: #1a2a6c;
        }

        input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 30px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #3498db; box-shadow: 0 0 8px rgba(52,152,219,0.3); }

        button {
            width: 100%;
            padding: 12px;
            background: #1a2a6c;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover { background: #3498db; transform: scale(1.02); }

        .error-msg { color: red; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <i class="fas fa-hospital-symbol main-icon"></i>
    <h2>دخول النظام</h2>
    
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="اسم المستخدم">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="كلمة المرور">
    </div>

    <button onclick="checkLogin()">تسجيل الدخول</button>
    <p id="error" class="error-msg">خطأ في الاسم أو كلمة المرور!</p>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // التحقق البسيط (يمكنك تعديله)
        if(user === "admin" && pass === "123") {
            // حفظ حالة تسجيل الدخول في المتصفح
            localStorage.setItem('isLoggedIn', 'true');
            // الانتقال للوحة التحكم
            window.location.href = "index.html";
        } else {
            document.getElementById('error').style.display = "block";
        }
    }
</script>

</body>
</html>
