<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الغرف والتنويم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI'; background: #f4f7f9; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 900px; margin: auto; border-top: 6px solid #e67e22; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: #e67e22; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; grid-column: span 2; font-weight: bold; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: #e67e22; color: white; }
    </style>
</head>
<body>
    <div style="margin-bottom:20px;"><a href="index.html" style="text-decoration:none; color:#e67e22;">⬅ العودة للرئيسية</a></div>
    <div class="card">
        <h2><i class="fas fa-bed"></i> إدارة الغرف والتنويم</h2>
        <div class="grid-form">
            <input type="number" id="roomNo" placeholder="رقم الغرفة (Room_no)">
            <input type="number" id="pId" placeholder="رقم المريض (Paid)">
            <div><label>تاريخ الدخول:</label><input type="date" id="inDate"></div>
            <div><label>تاريخ الخروج المتوقع:</label><input type="date" id="outDate"></div>
            <button class="btn-save" onclick="saveRoom()">تأكيد حجز الغرفة</button>
        </div>
        <table id="roomTable">
            <thead>
                <tr><th>الغرفة</th><th>رقم المريض</th><th>الدخول</th><th>الخروج</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        function saveRoom() {
            let r = { room: document.getElementById('roomNo').value, paid: document.getElementById('pId').value, in: document.getElementById('inDate').value, out: document.getElementById('outDate').value };
            let list = JSON.parse(localStorage.getItem('rooms')) || [];
            list.push(r);
            localStorage.setItem('rooms', JSON.stringify(list));
            location.reload();
        }
        window.onload = function() {
            let list = JSON.parse(localStorage.getItem('rooms')) || [];
            let tbody = document.querySelector("#roomTable tbody");
            list.forEach(r => { tbody.innerHTML += `<tr><td>${r.room}</td><td>${r.paid}</td><td>${r.in}</td><td>${r.out}</td></tr>`; });
        }
    </script>
</body>
</html>
